org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Mapbox secret token (sk.eyJ1...) — required to download the Mapbox Maps SDK at build time.
# Get it from https://account.mapbox.com → Access Tokens → Create a secret token with DOWNLOADS:READ scope.
# Keep this file out of version control (.gitignore).
MAPBOX_DOWNLOADS_TOKEN=YOUR_MAPBOX_SECRET_TOKEN_HERE
